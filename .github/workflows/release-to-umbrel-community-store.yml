name: Release OpenCode To Umbrel Community Store

on:
  push:
    branches:
      - main
    paths:
      - "docker-compose.yml"
      - "umbrel-app.yml"
      - "assets/**"
      - "hooks/**"
      - ".github/workflows/release-to-umbrel-community-store.yml"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional Umbrel app version override"
        required: false
        default: ""

concurrency:
  group: release-opencode-store-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      COMMUNITY_STORE_REPO: harmalh/umbrel-community-store
      COMMUNITY_STORE_APP_DIR: harmalh-opencode

    steps:
      - name: Verify community store token is configured
        shell: bash
        env:
          COMMUNITY_STORE_PAT: ${{ secrets.COMMUNITY_STORE_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${COMMUNITY_STORE_PAT}" ]; then
            echo "Missing required secret COMMUNITY_STORE_PAT" >&2
            echo "Create a fine-grained GitHub token with Contents: Read and write on harmalh/umbrel-community-store." >&2
            exit 1
          fi
          git ls-remote "https://x-access-token:${COMMUNITY_STORE_PAT}@github.com/harmalh/umbrel-community-store.git" HEAD >/dev/null

      - name: Checkout packaging repo
        uses: actions/checkout@v6

      - name: Checkout community store repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.COMMUNITY_STORE_REPO }}
          ref: main
          path: community-store

      - name: Resolve release version
        id: release
        shell: bash
        env:
          OVERRIDE_RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          set -euo pipefail
          VERSION="${OVERRIDE_RELEASE_VERSION}"
          if [ -z "${VERSION}" ]; then
            VERSION="$(python3 - <<'PY2'
          from pathlib import Path
          import re
          text = Path('umbrel-app.yml').read_text(encoding='utf-8')
          match = re.search(r'^version:\s*"([^"]+)"', text, flags=re.M)
          if not match:
              raise SystemExit('Unable to read version from umbrel-app.yml')
          print(match.group(1))
          PY2
          )"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare community store release files
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          target="community-store/${COMMUNITY_STORE_APP_DIR}"
          rm -rf "$target"
          mkdir -p "$target"
          cp docker-compose.yml umbrel-app.yml "$target/"
          cp -R assets hooks "$target/"
          python3 - <<'PY2'
          import os
          import re
          from pathlib import Path

          target = Path('community-store') / os.environ['COMMUNITY_STORE_APP_DIR']
          manifest_path = target / 'umbrel-app.yml'
          manifest_text = manifest_path.read_text(encoding='utf-8')
          manifest_text = re.sub(r'^version:\s*"[^"]+"', f'version: "{os.environ["RELEASE_VERSION"]}"', manifest_text, flags=re.M)
          manifest_text = re.sub(r'^icon:\s*.*$', 'icon: https://raw.githubusercontent.com/harmalh/umbrel-community-store/main/harmalh-opencode/assets/icon.svg', manifest_text, flags=re.M)
          manifest_text = re.sub(r'^submission:\s*.*$', 'submission: https://github.com/harmalh/umbrel-community-store', manifest_text, flags=re.M)
          manifest_path.write_text(manifest_text + '\n', encoding='utf-8')
          PY2

      - name: Push community store update
        shell: bash
        env:
          COMMUNITY_STORE_PAT: ${{ secrets.COMMUNITY_STORE_PAT }}
        run: |
          set -euo pipefail
          cd community-store
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git remote set-url origin "https://x-access-token:${COMMUNITY_STORE_PAT}@github.com/${COMMUNITY_STORE_REPO}.git"
          git add "${COMMUNITY_STORE_APP_DIR}"
          git diff --cached --quiet && exit 0
          git commit -m "Release OpenCode ${{ steps.release.outputs.version }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && exit 0
            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to push community store update after ${attempt} attempts" >&2
              exit 1
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done
