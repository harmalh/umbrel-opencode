manifestVersion: 1.1
id: harmalh-opencode
name: OpenCode
tagline: AI coding agent — setup in browser, run via Umbrel Terminal
icon: https://raw.githubusercontent.com/harmalh/umbrel-opencode/main/assets/icon.svg
category: developer
version: "0.2.1"
port: 23120
description: >-
  Run OpenCode (open-source AI coding agent) on your Umbrel. The dashboard opens
  a setup page in the browser; the official multi-arch image from Anomaly runs in
  the background with persistent data under this app’s folder.


  Interactive use is through the terminal: open Umbrel Settings → Advanced →
  Terminal and run docker exec into the opencode container (see the setup page
  for exact commands). Configure LLM providers per OpenCode docs — never commit
  API keys.


  **Install via community store:** https://github.com/harmalh/umbrel-community-store


  **Upstream:** https://opencode.ai/docs/ · Image: ghcr.io/anomalyco/opencode
developer: Harm Alhusen
website: https://github.com/harmalh/umbrel-opencode
submitter: Harm Alhusen
submission: https://github.com/harmalh/umbrel-community-store
repo: https://github.com/harmalh/umbrel-opencode
support: https://github.com/harmalh/umbrel-opencode/issues
gallery: []
releaseNotes: >-
  Publish on port 23120 instead of 80 so Umbrel app_proxy does not collide with
  host services. Pin ghcr.io/anomalyco/opencode:beta to a tested digest for
  reproducible installs.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
