version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: harmalh-opencode_web_1
      APP_PORT: 80

  web:
    image: nginx:1.25-alpine
    restart: on-failure
    init: true
    volumes:
      - ${APP_DATA_DIR}/www:/usr/share/nginx/html:ro

  # Official multi-arch image (amd64 + arm64):
  # https://github.com/anomalyco/opencode/pkgs/container/opencode
  # Interactive TUI: docker exec -it harmalh-opencode_opencode_1 ...
  # Digest pinned from ghcr.io/anomalyco/opencode:beta for reproducible installs.
  opencode:
    image: ghcr.io/anomalyco/opencode:beta@sha256:778c74ca292f97f86df5abb4c2b9894aca5da8e11422fba67dd21be59d94958d
    restart: on-failure
    init: true
    stop_grace_period: 1m
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]
    environment:
      HOME: /data
    volumes:
      - ${APP_DATA_DIR}/data:/data
